name: Deploy to Bluehost via FTP
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
               -e "set ftp:ssl-allow yes; set ssl:verify-certificate no; set ftp:passive-mode yes; \
                   mirror --reverse --delete --verbose --parallel=5 \
                   --exclude .git/ --exclude .github/ \
                   ./ /public_html/; quit" \
               ${{ secrets.FTP_HOST }}
